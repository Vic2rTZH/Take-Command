<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKE COMMAND — 7 Battle Domains Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8b424">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Take Command">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0d0d18;--bg2:#111120;--bg3:#16162a;--bg4:#1c1c32;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);
  --gold:#c9972b;--gold2:#f5c842;--gold3:#fdd668;
  --red:#c44040;--green:#2e8b4f;--blue:#2b6cb0;
  --text:#e8eaf0;--text2:#8890a8;--text3:#4a5068;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,.6);
  --font-military:'Bebas Neue',sans-serif;
  --font-body:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:16px}
a{text-decoration:none;color:inherit}
input,select,textarea,button{font-family:inherit}

/* ── SIDEBAR ── */
#sidebar{width:258px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-head{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:var(--font-military);font-size:20px;color:var(--gold2);letter-spacing:4px;background:linear-gradient(135deg,#c9972b,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-sub{font-family:var(--font-body);font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:2px;text-transform:uppercase;font-weight:600}
.sb-readiness{padding:14px 20px;border-bottom:1px solid var(--border)}
.sb-r-label{font-family:var(--font-body);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;font-weight:700}
.sb-r-score{font-family:var(--font-military);font-size:40px;color:var(--gold2);line-height:1.1;margin:3px 0;background:linear-gradient(135deg,#c9972b,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-r-status{font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.sb-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.sb-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .5s}
.sb-section{padding:10px 0}
.sb-sec-label{padding:4px 20px;font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-family:var(--font-military);font-size:16px;letter-spacing:1.5px;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:rgba(245,200,66,0.06);border-left-color:var(--gold2);color:var(--gold2)}
.nav-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0;opacity:0.7}
.nav-label{flex:1}
.nav-score{font-family:var(--font-military);font-size:14px;color:var(--gold2)}
.nav-trend{font-size:12px;margin-left:2px}
.sb-foot{margin-top:auto;padding:12px 20px;border-top:1px solid var(--border)}
.sb-foot-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;width:100%;transition:all .15s}
.sb-foot-btn:hover{border-color:var(--gold2);color:var(--gold2)}

/* ── MAIN ── */
#main{margin-left:258px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-family:var(--font-military);font-size:20px;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,#c9972b,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-date{font-family:var(--font-body);font-size:13px;color:var(--text2);letter-spacing:1px;font-weight:600}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:var(--font-military);font-size:15px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.btn-gold{background:linear-gradient(135deg,#c9972b,#f5c842);color:#0d0d18}
.btn-gold:hover{opacity:0.9;transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--gold2);color:var(--text)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
#content{padding:24px 28px;flex:1}

/* ── CARDS ── */
.card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.card-title{font-family:var(--font-military);font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-bottom:14px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.gap16{gap:16px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.mb24{margin-bottom:24px}
.mt16{margin-top:16px}
.mt20{margin-top:20px}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap8{gap:8px}
.gap12{gap:12px}

/* ── DOMAIN CARDS ── */
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.d-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.d-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.d-card:hover{border-color:rgba(245,200,66,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.6)}
.d-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.d-card-left{display:flex;align-items:center;gap:10px}
.d-card-icon{font-size:20px;opacity:0.8}
.d-card-name{font-family:var(--font-military);font-size:18px;letter-spacing:2px}
.d-card-sub{font-family:var(--font-body);font-size:11px;color:var(--text2);margin-top:1px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.d-card-score{font-family:var(--font-military);font-size:36px;line-height:1;text-align:right;background:linear-gradient(135deg,#c9972b,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.d-card-trend{font-family:var(--font-body);font-size:13px;font-weight:700;text-align:right}
.d-prog{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:10px}
.d-prog-fill{height:100%;border-radius:3px;transition:width .5s}
.d-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:3px 7px;font-size:10px;color:var(--text2)}

/* ── STATUS ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-family:var(--font-military);font-size:13px;letter-spacing:2px;text-transform:uppercase}
.badge-exc{background:rgba(46,139,79,.2);color:#4ade80;border:1px solid rgba(46,139,79,.3)}
.badge-good{background:rgba(43,108,176,.2);color:#60a5fa;border:1px solid rgba(43,108,176,.3)}
.badge-warn{background:rgba(201,153,12,.2);color:#fbbf24;border:1px solid rgba(201,153,12,.3)}
.badge-crit{background:rgba(196,64,64,.2);color:#f87171;border:1px solid rgba(196,64,64,.3)}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-family:var(--font-military);font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.form-desc{font-size:11px;color:var(--text3);margin-bottom:5px}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:9px 12px;font-size:14px;font-family:var(--font-body);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--gold)}
.form-input[type=range]{padding:4px 0;accent-color:var(--gold);cursor:pointer}
.slider-val{font-family:var(--font-military);font-size:15px;color:var(--gold2);min-width:30px;text-align:right}
.slider-row{display:flex;align-items:center;gap:10px}

/* ── METRIC DISPLAY ── */
.metric-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.metric-row:last-child{border:none}
.metric-label{flex:1;font-size:15px;color:var(--text2)}
.metric-val{font-family:var(--font-military);font-size:20px;color:var(--text);white-space:nowrap}
.metric-unit{font-size:10px;color:var(--text3);margin-left:2px}
.metric-bar-wrap{width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0}
.metric-bar-fill{height:100%;border-radius:2px}
.m-trend-up{color:#4ade80}
.m-trend-down{color:#f87171}

/* ── AI PANEL ── */
.ai-panel{background:linear-gradient(135deg,rgba(245,200,66,0.04),rgba(201,151,43,0.02));border:1px solid rgba(245,200,66,0.15);border-radius:var(--radius);padding:18px}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-title{font-family:var(--font-military);font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--gold2)}
.ai-rec{padding:11px 13px;background:rgba(0,0,0,.3);border-radius:var(--radius);margin-bottom:9px;border-left:2px solid var(--gold2)}
.ai-rec-tag{font-family:var(--font-military);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);margin-bottom:4px}
.ai-rec-text{font-family:var(--font-body);font-size:15px;color:var(--text);line-height:1.6;font-weight:500}
.ai-rec.critical{border-left-color:var(--red)}
.ai-rec.critical .ai-rec-tag{color:#f87171}

/* ── HEALTH IMPORT ── */
.health-drop{border:2px dashed var(--border2);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg4)}
.health-drop:hover,.health-drop.dragover{border-color:var(--gold);background:rgba(201,153,12,.05)}
.health-drop.has-img{border-style:solid;border-color:var(--green)}
.health-preview{max-width:100%;max-height:300px;border-radius:var(--radius);margin-top:12px;object-fit:contain}

/* ── TABS ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold2)}
.tab:hover:not(.active){color:var(--text)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── CHART ── */
.chart-wrap{position:relative}
.radar-wrap{height:420px}
.trend-wrap{height:200px}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:10px;margin:20px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-family:'Courier New',Consolas,monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:rgba(22,22,42,0.98);border:1px solid var(--border);border-radius:var(--radius);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head-title{font-family:var(--font-military);font-size:16px;letter-spacing:3px;background:linear-gradient(135deg,#c9972b,#f5c842);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.hidden{display:none!important}

/* ── REPORT ── */
.report-section{margin-bottom:24px}
.report-title{font-family:var(--font-military);font-size:24px;color:var(--gold2);letter-spacing:4px;margin-bottom:4px}
.report-date{font-size:12px;color:var(--text2)}
.report-domain-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.report-d-name{width:120px;font-weight:700;font-size:13px}
.report-d-bar{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.report-d-fill{height:100%;border-radius:4px}
.report-d-score{width:50px;text-align:right;font-family:var(--font-military);font-size:16px}
.report-d-status{width:100px;text-align:right}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* ── TREND UP/DOWN ── */
.t-up{color:#4ade80}
.t-down{color:#f87171}
.t-flat{color:var(--text3)}

/* ── VIRGIL CHAT ── */
.virgil-wrap{display:flex;flex-direction:column;height:600px;background:var(--bg3);border:1px solid rgba(201,153,12,.3);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.virgil-header{padding:14px 18px;background:linear-gradient(135deg,rgba(201,153,12,.12),rgba(201,153,12,.04));border-bottom:1px solid rgba(201,153,12,.25);display:flex;align-items:center;gap:12px;flex-shrink:0}
.virgil-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 12px rgba(201,153,12,.4)}
.virgil-name{font-family:var(--font-military);font-size:18px;letter-spacing:3px;color:var(--gold2)}
.virgil-status{font-size:11px;color:var(--text3);margin-top:1px}
.virgil-status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:5px;box-shadow:0 0 6px #4ade80}
.virgil-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.vmsg{display:flex;gap:10px;align-items:flex-start;animation:vmsg-in .2s ease}
@keyframes vmsg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.vmsg.user{flex-direction:row-reverse}
.vmsg-bubble{max-width:78%;padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.6}
.vmsg.virgil .vmsg-bubble{background:rgba(201,153,12,.08);border:1px solid rgba(201,153,12,.2);color:var(--text)}
.vmsg.user .vmsg-bubble{background:rgba(43,108,176,.2);border:1px solid rgba(43,108,176,.35);color:var(--text);text-align:right}
.vmsg-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.vmsg.virgil .vmsg-icon{background:linear-gradient(135deg,var(--gold),var(--gold2))}
.vmsg.user .vmsg-icon{background:rgba(43,108,176,.3);border:1px solid rgba(43,108,176,.4)}
.vmsg-typing{display:flex;gap:5px;align-items:center;padding:10px 14px;background:rgba(201,153,12,.06);border:1px solid rgba(201,153,12,.15);border-radius:10px;width:60px}
.vmsg-typing span{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:vdot .9s infinite}
.vmsg-typing span:nth-child(2){animation-delay:.15s}
.vmsg-typing span:nth-child(3){animation-delay:.3s}
@keyframes vdot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.virgil-input-row{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg2);flex-shrink:0}
.virgil-input{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;font-size:14px;color:var(--text);outline:none;resize:none;height:42px;overflow:hidden;transition:border-color .15s;font-family:inherit}
.virgil-input:focus{border-color:var(--gold)}
.virgil-send{background:var(--gold);color:#000;border:none;border-radius:8px;padding:10px 16px;font-family:var(--font-military);font-size:15px;letter-spacing:1px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.virgil-send:hover{background:var(--gold2)}
.virgil-send:disabled{opacity:.4;cursor:not-allowed}
.virgil-mic{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;font-size:16px;cursor:pointer;transition:all .15s;flex-shrink:0}
.virgil-mic:hover{border-color:var(--gold);color:var(--text)}
.virgil-mic.listening{background:rgba(196,64,64,.25);border-color:#f87171;color:#f87171;animation:vpulse 1s infinite}
@keyframes vpulse{0%,100%{opacity:1}50%{opacity:.5}}
.virgil-tts{background:none;border:none;font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px;opacity:.5;transition:all .15s}
.virgil-tts:hover{opacity:1}
.virgil-tts.on{opacity:1;color:var(--gold2)}
.virgil-quick-btns{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;flex-shrink:0}
.vqbtn{background:var(--bg4);border:1px solid var(--border2);border-radius:16px;padding:5px 12px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.3px}
.vqbtn:hover{border-color:var(--gold);color:var(--gold2)}

/* ── PRINT ── */
@media print {
  #sidebar,.no-print,#topbar{display:none!important}
  #main{margin-left:0}
  body{background:#fff;color:#000}
  .card,.d-card,.ai-panel{border:1px solid #ccc;box-shadow:none;background:#fff}
  .report-title,.ai-title,.card-title{color:#000}
  .text2,.metric-label,.form-label{color:#444}
  .ai-rec{background:#f5f5f5;border-left-color:#999}
  .report-d-bar,.d-prog,.metric-bar-wrap{background:#eee}
  .badge-exc,.badge-good,.badge-warn,.badge-crit{border:1px solid #999;color:#000;background:#eee}
}

/* ── TASKS ── */
.task-table{width:100%;border-collapse:collapse;font-size:14px}
.task-table th{text-align:left;font-family:var(--font-military);font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:8px 10px;border-bottom:2px solid var(--border2)}
.task-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.task-table tbody tr:last-child td{border-bottom:none}
.task-table tbody tr:hover td{background:rgba(255,255,255,0.02)}
.task-cb{width:18px;height:18px;cursor:pointer;accent-color:var(--gold2);flex-shrink:0;margin-top:2px}
.task-name{font-weight:600;color:var(--text);outline:none;border-bottom:1px solid transparent;transition:border-color .15s}
.task-name:focus{border-bottom-color:var(--gold)}
.task-detail{font-size:13px;color:var(--text2);margin-top:2px;outline:none;border-bottom:1px solid transparent;transition:border-color .15s}
.task-detail:focus{border-bottom-color:var(--border2)}
.task-prog-wrap{width:70px;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.task-prog-fill{height:100%;border-radius:3px;transition:width .3s}
.task-due{font-size:12px;white-space:nowrap;margin-top:3px}
.task-due.overdue{color:#f87171;font-weight:700}
.task-due.due-today{color:#fbbf24;font-weight:700}
.task-due.upcoming{color:var(--text2)}
.task-actions{display:flex;gap:5px}
.task-btn{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text2);transition:all .15s;font-weight:600}

.task-btn.del:hover{border-color:var(--red);color:#f87171}

.task-filter-btn.active{background:var(--gold2);color:#000;border-color:var(--gold2)}
.task-add-form{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-top:14px}
.task-domain-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--bg3)}

async function supabasePush(key, value) {
  const { data: { user } } = await _supa.auth.getUser();
  if (!user) return;
  await _supa.from('tc_sync').upsert(
    { user_id: user.id, key, value, updated_at: new Date().toISOString() },
    { onConflict: 'user_id,key' }
  );
}

async function supabasePull() {
  const { data: { user } } = await _supa.auth.getUser();
  if (!user) return;
  const { data } = await _supa.from('tc_sync').select('key,value,updated_at').eq('user_id', user.id);
  if (!data?.length) return;
  data.forEach(row => {
    const local = localStorage.getItem(row.key);
    // Supabase wins if local is empty; merge by updated_at for tcmd_data
    if (!local) {
      localStorage.setItem(row.key, JSON.stringify(row.value));
    } else if (row.key === 'tcmd_data') {
      try {
        const localObj = JSON.parse(local);
        const remoteObj = row.value;
        // Merge entries: keep newer entry per date
        const merged = Object.assign({}, remoteObj.entries || {}, localObj.entries || {});
        // For each date, prefer whichever has newer _ts
        Object.keys(remoteObj.entries || {}).forEach(date => {
          const lEntry = localObj.entries?.[date];
          const rEntry = remoteObj.entries[date];
          if (!lEntry) { merged[date] = rEntry; return; }
          // merge domain by domain, newer _ts wins
          Object.keys(rEntry).forEach(domId => {
            const lTs = lEntry[domId]?._ts || 0;
            const rTs = rEntry[domId]?._ts || 0;
            if (rTs > lTs) merged[date] = Object.assign({}, merged[date], { [domId]: rEntry[domId] });
          });
        });
        const result = Object.assign({}, remoteObj, localObj, { entries: merged });
        localStorage.setItem(row.key, JSON.stringify(result));
      } catch(e) {}
    } else {
      // For other keys, use whichever is newer (Supabase updated_at vs local)
      const remoteTime = new Date(row.updated_at).getTime();
      const localTime = parseInt(localStorage.getItem(row.key + '_ts') || '0');
      if (remoteTime > localTime) localStorage.setItem(row.key, JSON.stringify(row.value));
    }
  });
  showToast('✓ Data synced from cloud');
}

const BACKUP_KEY = 'tc_backup_handle';

async function _getBackupDb() {
  return new Promise((res,rej)=>{
    const r = indexedDB.open('tc_backup',1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
async function getBackupHandle() {
  try {
    const db = await _getBackupDb();
    return new Promise(res=>{
      const tx = db.transaction('handles','readonly');
      const req = tx.objectStore('handles').get('backupFile');
      req.onsuccess = () => res(req.result||null);
      req.onerror = () => res(null);
    });
  } catch(e){ return null; }
}
async function setBackupHandle(handle) {
  try {
    const db = await _getBackupDb();
    return new Promise(res=>{
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').put(handle,'backupFile');
      tx.oncomplete = () => res(true);
      tx.onerror = () => res(false);
    });
  } catch(e){ return false; }
}

async function autoBackupToFile() {
  const handle = await getBackupHandle();
  if (!handle) return;
  try {
    const perm = await handle.queryPermission({mode:'readwrite'});
    if (perm !== 'granted') return; // silent — don't nag on every save
    const bundle = {_version:2,_exportedAt:new Date().toISOString(),tcmd_data:getData(),tc_tasks:JSON.parse(localStorage.getItem('tc_tasks')||'[]'),tc_finance:JSON.parse(localStorage.getItem('tc_finance')||'{}'),virgil_logs:JSON.parse(localStorage.getItem('virgil_logs')||'[]')};
    const w = await handle.createWritable();
    await w.write(JSON.stringify(bundle, null, 2));
    await w.close();
    const dot = document.getElementById('backup-dot');
    if (dot) { dot.style.background = '#4ade80'; dot.title = 'Auto-backup: saved ' + new Date().toLocaleTimeString(); }
  } catch(e) {}
}

function todayKey() {
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function prevKey() {
  const d=new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getEntry(dateKey) { const d=getData(); return d.entries[dateKey]||{}; }

// Returns the most recent logged entry for a domain (used for carry-forward)
function getLastDomainEntry(domainId) {
  const entries = getData().entries;
  const dates = Object.keys(entries)
    .filter(dt => {
      const de = entries[dt][domainId];
      return de && Object.keys(de).some(k=>!k.startsWith('_'));
    })
    .sort().reverse();
  if(!dates.length) return null;
  return {date: dates[0], data: entries[dates[0]][domainId]};
}

// Returns domain entry with carry-forward if today has no data
function getEffectiveDomainEntry(domainId, dateKey) {
  const todayDomain = (getEntry(dateKey)||{})[domainId];
  const hasData = todayDomain && Object.keys(todayDomain).some(k=>!k.startsWith('_'));
  if(hasData) return {data: todayDomain, carriedOver: false, fromDate: dateKey};
  const last = getLastDomainEntry(domainId);
  if(last && last.date !== dateKey) return {data: last.data, carriedOver: true, fromDate: last.date};
  return {data: {}, carriedOver: false, fromDate: null};
}
function saveEntry(dateKey, domainId, metrics) {
  const d=getData();
  if(!d.entries[dateKey]) d.entries[dateKey]={};
  d.entries[dateKey][domainId] = Object.assign({}, d.entries[dateKey][domainId]||{}, metrics, {_ts: Date.now()});
  saveData(d);
}
function getLast30Days() {
  const days=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
  return days;
}

// ================================================================
//  SCORING
// ================================================================
function metricScore(metric, val) {
  if(metric.noScore) return null; // display-only metric, doesn't affect score
  if(val===null||val===undefined||val==='') return null;
  const v = parseFloat(val);
  if(isNaN(v)) return null;
  if(metric.lowerIsBetter) {
    const best = metric.min || 0;
    const worst = metric.target * 2.5;
    if(v<=metric.target) return 100;
    return Math.max(0, Math.round(100-(v-metric.target)/(worst-metric.target)*100));
  }
  if(metric.optimal) {
    const [lo,hi] = metric.optimal;
    if(v>=lo && v<=hi) return 100;
    if(v<lo) return Math.max(0, Math.round(v/lo*100));
    return Math.max(0, Math.round(100-(v-hi)/(metric.max-hi)*50));
  }
  return Math.min(100, Math.round(v/metric.target*100));
}

function domainScore(domainId, dateKey) {
  const dom = DOMAINS.find(d=>d.id===domainId);
  if(!dom) return null;
  const effective = getEffectiveDomainEntry(domainId, dateKey);
  const domEntry = effective.data;
  const scores = dom.metrics.map(m=>metricScore(m, domEntry[m.id])).filter(s=>s!==null);
  if(!scores.length) return null;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}

function overallScore(dateKey) {
  const scores = DOMAINS.map(d=>domainScore(d.id, dateKey)).filter(s=>s!==null);
  if(!scores.length) return null;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}

function trend(domainId) {
  const c=domainScore(domainId, todayKey());
  const p=domainScore(domainId, prevKey());
  if(c===null||p===null) return 'flat';
  if(c>p+2) return 'up';
  if(c<p-2) return 'down';
  return 'flat';
}

function _sizeCanvas(canvas) {
  const p = canvas.parentElement;
  if(p) { canvas.width = p.offsetWidth || 400; canvas.height = p.offsetHeight || 280; }
}

function renderRadar(canvasId) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  _sizeCanvas(canvas);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2 + 10;
  const r = Math.min(W, H) * 0.32;
  const N = DOMAINS.length;
  const today = todayKey();
  const scores   = DOMAINS.map(d=>(domainScore(d.id,today)||0)/100);
  const prevScores = DOMAINS.map(d=>(domainScore(d.id,prevKey())||0)/100);
  ctx.clearRect(0,0,W,H);
  const ang = j => (j/N)*Math.PI*2 - Math.PI/2;
  const pt  = (j,s) => ({x: cx+Math.cos(ang(j))*r*s, y: cy+Math.sin(ang(j))*r*s});

  // Grid rings
  for(let ring=1;ring<=4;ring++){
    ctx.beginPath();
    for(let j=0;j<N;j++){ const p=pt(j,ring/4); j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); }
    ctx.closePath(); ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(140,160,190,0.8)'; ctx.font='11px "Bebas Neue",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ring*25+'%', cx+2, cy-r*(ring/4)+1);
  }
  // Axes
  for(let j=0;j<N;j++){
    const p=pt(j,1); ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
  }
  // Yesterday fill
  ctx.beginPath();
  for(let j=0;j<N;j++){ const p=pt(j,prevScores[j]); j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); }
  ctx.closePath(); ctx.fillStyle='rgba(120,120,140,0.18)'; ctx.fill();
  ctx.strokeStyle='rgba(140,140,170,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  // Today fill
  ctx.beginPath();
  for(let j=0;j<N;j++){ const p=pt(j,scores[j]); j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); }
  ctx.closePath(); ctx.fillStyle='rgba(201,153,12,0.32)'; ctx.fill();
  ctx.strokeStyle='rgba(255,200,40,1.0)'; ctx.lineWidth=3; ctx.stroke();
  // Dots
  for(let j=0;j<N;j++){
    const p=pt(j,scores[j]); ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.fillStyle='#ffe066'; ctx.fill(); ctx.strokeStyle='rgba(255,200,40,0.5)'; ctx.lineWidth=3; ctx.stroke();
  }
  // Labels
  const lpad=26;
  for(let j=0;j<N;j++){
    const a=ang(j), lx=cx+Math.cos(a)*(r+lpad), ly=cy+Math.sin(a)*(r+lpad);
    ctx.font='16px "Bebas Neue",sans-serif'; ctx.fillStyle='#c8daf0';
    ctx.textAlign=Math.cos(a)>0.2?'left':Math.cos(a)<-0.2?'right':'center';
    ctx.textBaseline=Math.sin(a)>0.2?'top':Math.sin(a)<-0.2?'bottom':'middle';
    ctx.fillText(DOMAINS[j].name, lx, ly);
  }
  // Legend
  ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.font='13px "Bebas Neue",sans-serif';
  ctx.strokeStyle='rgba(232,180,36,0.85)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(10,H-18); ctx.lineTo(26,H-18); ctx.stroke();
  ctx.fillStyle='#8fa0b8'; ctx.fillText('Today',30,H-18);
  ctx.strokeStyle='rgba(100,100,100,0.4)';
  ctx.beginPath(); ctx.moveTo(78,H-18); ctx.lineTo(94,H-18); ctx.stroke();
  ctx.fillText('Yesterday',98,H-18);
}

function renderTrend(canvasId, domainId) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  _sizeCanvas(canvas);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const dom = DOMAINS.find(d=>d.id===domainId);
  const days = getLast30Days();
  const scores = days.map(d=>domainScore(domainId,d));
  ctx.clearRect(0,0,W,H);
  if(!scores.some(s=>s!==null)){
    ctx.fillStyle='#4a5568'; ctx.font='13px Segoe UI,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('No data yet — log entries to see trend', W/2, H/2); return;
  }
  const PAD={top:12,right:16,bottom:34,left:38};
  const cW=W-PAD.left-PAD.right, cH=H-PAD.top-PAD.bottom;
  const xAt=i=>PAD.left+(i/(days.length-1))*cW;
  const yAt=s=>PAD.top+cH-(s/100)*cH;
  // Grid
  [25,50,75,100].forEach(v=>{
    const y=yAt(v); ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(PAD.left+cW,y);
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#4a5568'; ctx.font='10px Segoe UI'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(v+'%',PAD.left-4,y);
  });
  // Points
  const pts=[];
  scores.forEach((s,i)=>{ if(s!==null) pts.push({x:xAt(i),y:yAt(s)}); });
  if(pts.length>1){
    ctx.beginPath(); ctx.moveTo(pts[0].x,PAD.top+cH);
    pts.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.lineTo(pts[pts.length-1].x,PAD.top+cH);
    ctx.closePath(); ctx.fillStyle=dom.color+'22'; ctx.fill();
    ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle=dom.color; ctx.lineWidth=2; ctx.stroke();
  }
  pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fillStyle=dom.color; ctx.fill(); });
  // X labels
  ctx.fillStyle='#4a5568'; ctx.font='9px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='top';
  days.forEach((d,i)=>{ if(i%7===0||i===days.length-1) ctx.fillText(d.slice(5),xAt(i),PAD.top+cH+5); });
}

function runAI() {
  const today = todayKey();
  const scores = DOMAINS.map(d=>({id:d.id, name:d.name, icon:d.icon, score:domainScore(d.id,today)}));
  const withData = scores.filter(s=>s.score!==null);
  if(!withData.length) return {overall:null, recs:[], status:'NO DATA'};

  const overall = overallScore(today);
  const sorted = [...withData].sort((a,b)=>a.score-b.score);
  const weakest = sorted.slice(0,2);
  const strongest = sorted[sorted.length-1];
  const recs = [];

  // Critical domains
  weakest.forEach(w=>{
    const dom=DOMAINS.find(d=>d.id===w.id);
    const tier = w.score<40?'critical':w.score<60?'degraded':w.score<75?'adequate':w.score<90?'good':'excellent';
    recs.push({tag:`${w.icon} ${w.name} — PRIORITY TARGET`, text:dom.aiInsights[tier], critical:w.score<60});
  });

  // Cross-domain insights
  const physScore = scores.find(s=>s.id==='physical')?.score;
  const profScore = scores.find(s=>s.id==='professional')?.score;
  const spirScore = scores.find(s=>s.id==='spiritual')?.score;
  const finScore  = scores.find(s=>s.id==='financial')?.score;

  if(physScore!==null && physScore<60 && profScore!==null && profScore<75) {
    recs.push({tag:'⚡ Cross-Domain Alert: Physical ↔ Professional', text:'Poor physical readiness is directly degrading professional performance. Neuroscience confirms: sleep deprivation and inactivity reduce cognitive function, decision-making, and resilience. Fix the body to fix the mission.', critical:true});
  }
  if(spirScore!==null && spirScore<60) {
    recs.push({tag:'🎯 COG Under Threat', text:'When the Center of Gravity falls, the entire campaign falls apart. Spiritual weakness creates cascading vulnerabilities across all other domains. Prioritize spiritual recovery before advancing elsewhere.', critical:true});
  }
  if(finScore!==null && finScore<50 && physScore!==null && physScore<70) {
    recs.push({tag:'⚠️ Dual Domain Strain', text:'Financial and physical domains are simultaneously degraded. Stress from financial pressure is likely amplifying physical stress levels. Address both in parallel: establish a financial baseline and daily physical protocol.', critical:false});
  }

  // Strength leverage
  if(strongest && strongest.score>75) {
    recs.push({tag:`✅ Leverage Strength: ${strongest.icon} ${strongest.name}`, text:`Your ${strongest.name} domain is your strongest asset right now. Use its momentum to pull up weaker domains. Let your strength fund your recovery.`, critical:false});
  }

  // Overall battle plan
  const battlePlan = generateBattlePlan(scores);
  recs.push({tag:'📋 Commander\'s 3-Point Battle Plan', text:battlePlan, critical:false});

  return {overall, scores, recs, weakest, strongest};
}

function generateBattlePlan(scores) {
  const withData = scores.filter(s=>s.score!==null);
  if(!withData.length) return 'Log data across all 7 domains to generate your personalized battle plan.';
  const sorted = [...withData].sort((a,b)=>a.score-b.score);
  const [p1,p2] = sorted;
  const p3 = withData.find(s=>s.score>=75) || sorted[sorted.length-1];
  return `1. SECURE THE BREACH: Focus maximum energy on ${p1?p1.name:'your weakest domain'} this week — one deliberate improvement action daily.\n\n2. STABILIZE SECOND FRONT: Address ${p2&&p2.id!==p1?.id?p2.name:'your next priority domain'} with a structured weekly protocol.\n\n3. EXPLOIT ADVANTAGE: Leverage your strength in ${p3.name} to create positive momentum — document a win and let it fuel your confidence in the weaker domains.`;
}

function getTasks(){try{return JSON.parse(localStorage.getItem('tc_tasks')||'[]');}catch(e){return[];}}
function saveTasks(t){localStorage.setItem('tc_tasks',JSON.stringify(t));autoSyncTaskFile();supabasePush('tc_tasks',t);}
function genTaskId(){return 'tk_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}

function addTask(domainId,task,details,dueDate,progress){
  const tasks=getTasks();
  tasks.push({id:genTaskId(),domainId,task,details:details||'',dueDate:dueDate||'',progress:parseInt(progress)||0,completed:false,completedAt:null,createdAt:todayKey()});
  saveTasks(tasks);
}

function updateTaskField(id,field,value){
  const tasks=getTasks();
  const t=tasks.find(t=>t.id===id);
  if(!t)return;
  t[field]=value;
  saveTasks(tasks);
}

function completeTask(id){
  const tasks=getTasks();
  const t=tasks.find(t=>t.id===id);
  if(!t)return;
  t.completed=true; t.completedAt=todayKey(); t.progress=100;
  saveTasks(tasks);
}

function deleteTask(id){saveTasks(getTasks().filter(t=>t.id!==id));}

function getActiveTasks(filter,domainId){
  const today=todayKey();
  const now=new Date(today+'T00:00:00');
  let tasks=getTasks().filter(t=>!t.completed);
  if(domainId)tasks=tasks.filter(t=>t.domainId===domainId);
  if(filter==='today'){
    tasks=tasks.filter(t=>!t.dueDate||t.dueDate===today||t.dueDate<today);
  }else if(filter==='week'){
    const end=new Date(now);end.setDate(now.getDate()+7);
    tasks=tasks.filter(t=>{if(!t.dueDate)return true;return new Date(t.dueDate+'T00:00:00')<=end;});
  }else if(filter==='month'){
    const end=new Date(now);end.setDate(now.getDate()+30);
    tasks=tasks.filter(t=>{if(!t.dueDate)return true;return new Date(t.dueDate+'T00:00:00')<=end;});
  }
  tasks.sort((a,b)=>{
    if(!a.dueDate&&!b.dueDate)return 0;
    if(!a.dueDate)return 1;if(!b.dueDate)return -1;
    return a.dueDate.localeCompare(b.dueDate);
  });
  return tasks;
}

function taskDueClass(dueDate){
  if(!dueDate)return'upcoming';
  const t=todayKey();
  if(dueDate<t)return'overdue';
  if(dueDate===t)return'due-today';
  return'upcoming';
}

function taskDueLabel(dueDate){
  if(!dueDate)return'—';
  const today=todayKey();
  const d=new Date(dueDate+'T00:00:00');
  const label=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(dueDate<today)return'⚠ '+label+' (overdue)';
  if(dueDate===today)return'📅 Today';
  return label;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  const date=document.getElementById('fin-date-'+section)?.value||todayKey();
  const notes=(document.getElementById('fin-notes-'+section)?.value||'').trim();
  const cat=section==='expenses'?(document.getElementById('fin-cat-expenses')?.value||'other'):'';
  if(!label||isNaN(amount)||amount<=0){showToast('Enter a description and valid amount');return;}
  addFinEntry(_finMonth,section,{label,amount,date,notes,category:cat});
  showToast('Entry saved');
  rerenderFinance();
}

function renderExpenseChart(){
  const canvas=document.getElementById('expense-chart');
  if(!canvas)return;
  finInit();
  const data=getFinance(_finMonth);
  const bycat={};
  data.expenses.forEach(e=>{const c=e.category||'other'; bycat[c]=(bycat[c]||0)+e.amount;});
  const total=Object.values(bycat).reduce((s,v)=>s+v,0);
  const par=canvas.parentElement;
  canvas.width=par?par.clientWidth||320:320;
  canvas.height=240;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(total===0){
    ctx.fillStyle='#4a5568'; ctx.font='14px Segoe UI,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('No expenses logged this month',canvas.width/2,canvas.height/2); return;
  }
  const cx=canvas.width/2, cy=112, r=90, inner=52;
  let ang=-Math.PI/2;
  const segs=[];
  FIN_CATS.forEach(cat=>{
    const val=bycat[cat.id]||0;
    if(val>0){ const sl=(val/total)*Math.PI*2; segs.push({...cat,val,sl,ang}); ang+=sl; }
  });
  segs.forEach(seg=>{
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,seg.ang,seg.ang+seg.sl);
    ctx.closePath(); ctx.fillStyle=seg.color; ctx.fill();
    ctx.strokeStyle='#0e1117'; ctx.lineWidth=2.5; ctx.stroke();
  });
  // donut hole
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2);
  ctx.fillStyle='#161b24'; ctx.fill();
  // center label
  ctx.fillStyle='#8fa0b8'; ctx.font='11px Courier New,monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('TOTAL',cx,cy-12);
  ctx.fillStyle='#e8b424'; ctx.font='bold 13px Courier New,monospace';
  ctx.fillText(fmtZMW(total),cx,cy+6);
}

function getFinMonths(n){
  const months=[];
  const now=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }
  return months;
}

function getFinQuarters(year){
  return [
    {label:'Q1',months:[year+'-01',year+'-02',year+'-03']},
    {label:'Q2',months:[year+'-04',year+'-05',year+'-06']},
    {label:'Q3',months:[year+'-07',year+'-08',year+'-09']},
    {label:'Q4',months:[year+'-10',year+'-11',year+'-12']},
  ];
}

function aggregateFinData(months){
  return months.map(m=>{
    const d=getFinance(m);
    return {
      month:m,
      income:d.incomes.reduce((s,e)=>s+(e.amount||0),0),
      savings:d.savings.reduce((s,e)=>s+(e.amount||0),0),
      investments:d.investments.reduce((s,e)=>s+(e.amount||0),0),
      expenses:d.expenses.reduce((s,e)=>s+(e.amount||0),0),
    };
  });
}

function aggregateFinQuarters(year){
  return getFinQuarters(year).map(q=>{
    const data=aggregateFinData(q.months);
    return {
      label:q.label,
      income:data.reduce((s,d)=>s+d.income,0),
      savings:data.reduce((s,d)=>s+d.savings,0),
      investments:data.reduce((s,d)=>s+d.investments,0),
      expenses:data.reduce((s,d)=>s+d.expenses,0),
    };
  });
}

let _finTrendPeriod='6m';

function setFinTrendPeriod(p){
  _finTrendPeriod=p;
  renderFinTrendChart();
  // update button states
  document.querySelectorAll('.fin-trend-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.period===p);
  });
}

function renderFinTrendChart(){
  const canvas=document.getElementById('fin-trend-canvas');
  if(!canvas)return;

  let labels=[], series={income:[],savings:[],investments:[],expenses:[]};
  const year=new Date().getFullYear();

  if(_finTrendPeriod==='quarterly'){
    const quarters=aggregateFinQuarters(year);
    labels=quarters.map(q=>q.label+' '+year);
    quarters.forEach(q=>{
      series.income.push(q.income);
      series.savings.push(q.savings);
      series.investments.push(q.investments);
      series.expenses.push(q.expenses);
    });
  } else {
    const n=_finTrendPeriod==='6m'?6:12;
    const months=getFinMonths(n);
    const data=aggregateFinData(months);
    labels=months.map(m=>{ const[y,mo]=m.split('-'); return new Date(y,parseInt(mo)-1,1).toLocaleDateString('en-US',{month:'short',year:'2-digit'}); });
    data.forEach(d=>{
      series.income.push(d.income);
      series.savings.push(d.savings);
      series.investments.push(d.investments);
      series.expenses.push(d.expenses);
    });
  }

  const allVals=[...series.income,...series.savings,...series.investments,...series.expenses].filter(v=>v>0);
  const maxVal=allVals.length?Math.max(...allVals)*1.15:1000;

  const par=canvas.parentElement;
  canvas.width=par?par.clientWidth-2:700;
  canvas.height=300;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const PAD={top:20,right:20,bottom:60,left:90};
  const cW=canvas.width-PAD.left-PAD.right;
  const cH=canvas.height-PAD.top-PAD.bottom;
  const N=labels.length;
  const groupW=cW/N;
  const barCount=4;
  const barGap=3;
  const barW=Math.max(6,Math.min(24,(groupW-barGap*(barCount+1))/barCount));

  const SERIES=[
    {key:'income',      label:'Income',      color:'#4ade80'},
    {key:'savings',     label:'Savings',     color:'#60a5fa'},
    {key:'investments', label:'Investments', color:'#a78bfa'},
    {key:'expenses',    label:'Expenses',    color:'#f87171'},
  ];

  // Grid lines
  const gridSteps=5;
  for(let i=0;i<=gridSteps;i++){
    const y=PAD.top+cH-(i/gridSteps)*cH;
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(PAD.left+cW,y);
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.stroke();
    const val=(maxVal/gridSteps)*i;
    ctx.fillStyle='#4a5568'; ctx.font='10px Segoe UI,sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    const valStr=val>=1000000?(val/1000000).toFixed(1)+'M':val>=1000?(val/1000).toFixed(0)+'K':val.toFixed(0);
    ctx.fillText('ZMW '+valStr,PAD.left-6,y);
  }

  // Y axis line
  ctx.beginPath(); ctx.moveTo(PAD.left,PAD.top); ctx.lineTo(PAD.left,PAD.top+cH);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1; ctx.stroke();

  // Bars
  labels.forEach((lbl,gi)=>{
    const groupX=PAD.left+gi*groupW+groupW/2-(barCount*barW+(barCount-1)*barGap)/2;
    SERIES.forEach((s,si)=>{
      const val=series[s.key][gi]||0;
      const barH=maxVal>0?(val/maxVal)*cH:0;
      const x=groupX+si*(barW+barGap);
      const y=PAD.top+cH-barH;
      // bar
      ctx.fillStyle=val>0?s.color:'rgba(255,255,255,0.04)';
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(x,y,barW,barH,3):ctx.rect(x,y,barW,barH);
      ctx.fill();
      // value on top if tall enough
      if(barH>24&&val>0){
        ctx.fillStyle='#fff'; ctx.font='bold 9px Segoe UI,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        const v=val>=1000000?(val/1000000).toFixed(1)+'M':val>=1000?(val/1000).toFixed(0)+'K':val.toFixed(0);
        ctx.fillText(v,x+barW/2,y-2);
      }
    });
    // X label
    ctx.fillStyle='#8fa0b8'; ctx.font='11px Segoe UI,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(lbl,PAD.left+gi*groupW+groupW/2,PAD.top+cH+8);
  });

  // Legend
  const legY=PAD.top+cH+34;
  let legX=PAD.left;
  SERIES.forEach(s=>{
    ctx.fillStyle=s.color;
    ctx.fillRect(legX,legY,12,10);
    ctx.fillStyle='#8fa0b8'; ctx.font='12px Segoe UI,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(s.label,legX+16,legY+5);
    legX+=ctx.measureText(s.label).width+40;
  });
}

const TC_SYNC_PATH_KEY = 'tc_sync_path';

async function _getSyncDb(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('tc_sync',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('handles');
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}
async function getSyncHandle(){
  try{
    const db=await _getSyncDb();
    return new Promise(res=>{
      const tx=db.transaction('handles','readonly');
      const req=tx.objectStore('handles').get('taskFile');
      req.onsuccess=()=>res(req.result||null);
      req.onerror=()=>res(null);
    });
  }catch(e){return null;}
}
async function saveSyncHandle(handle){
  try{
    const db=await _getSyncDb();
    return new Promise(res=>{
      const tx=db.transaction('handles','readwrite');
      tx.objectStore('handles').put(handle,'taskFile');
      tx.oncomplete=()=>res(true);
      tx.onerror=()=>res(false);
    });
  }catch(e){return false;}
}

async function writeTasksToFile(handle){
  try{
    const perm=await handle.queryPermission({mode:'readwrite'});
    if(perm!=='granted'){
      const req=await handle.requestPermission({mode:'readwrite'});
      if(req!=='granted') return false;
    }
    const all=getTasks();
    const today=todayKey();
    const payload={
      exportedAt:new Date().toISOString(),
      activeTasks:all.filter(t=>!t.completed).map(t=>{
        const dom=DOMAINS.find(d=>d.id===t.domainId);
        return{...t,domainName:dom?.name||t.domainId,domainIcon:dom?.icon||''};
      }),
      completedCount:all.filter(t=>t.completed).length,
      totalCount:all.length,
      overdueCount:all.filter(t=>!t.completed&&t.dueDate&&t.dueDate<today).length,
      dueTodayCount:all.filter(t=>!t.completed&&t.dueDate===today).length,
    };
    const w=await handle.createWritable();
    await w.write(JSON.stringify(payload,null,2));
    await w.close();
    return true;
  }catch(e){return false;}
}

async function autoSyncTaskFile(){
  const handle=await getSyncHandle();
  if(!handle) return;
  await writeTasksToFile(handle);
}

async function setupTaskFileSync(){
  if(!window.showSaveFilePicker){
    showToast('⚠ File sync requires Chrome or Edge'); return;
  }
  try{
    const handle=await window.showSaveFilePicker({
      suggestedName:'tc-tasks.json',
      startIn:'documents',
      types:[{description:'JSON File',accept:{'application/json':['.json']}}]
    });
    await saveSyncHandle(handle);
    localStorage.setItem(TC_SYNC_PATH_KEY, handle.name);
    const ok=await writeTasksToFile(handle);
    if(ok){
      showToast('✓ Auto-sync active — tasks export on every change');
      document.getElementById('sync-status')?.querySelector('.sync-state')?.textContent && (document.getElementById('sync-status').innerHTML=syncStatusHTML(handle.name));
    }
  }catch(e){
    if(e.name!=='AbortError') showToast('Setup failed: '+e.message);
  }
}

function syncStatusHTML(name){
  return name
    ?`<span style="color:#4ade80">✓ Syncing to <strong>${name}</strong></span> &nbsp;·&nbsp; <button onclick="setupTaskFileSync()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;text-decoration:underline">Change file</button>`
    :`<span style="color:var(--text3)">Not configured</span>`;
}

function buildDomainForm(dom, existingEntry) {
  return dom.metrics.map(m=>{
    const val = existingEntry[m.id] ?? '';
    if(m.type==='slider') {
      const v = val !== '' ? val : Math.round(m.max/2);
      return `<div class="form-group">
        <label class="form-label">${m.label} <span style="color:var(--text3);font-size:10px">(${m.unit})</span></label>
        <div class="slider-row">
          <input type="range" class="form-input" id="metric-${m.id}" name="${m.id}" min="${m.min}" max="${m.max}" step="${m.step||1}" value="${v}" oninput="this.nextElementSibling.textContent=this.value">
          <span class="slider-val" id="sv-${m.id}">${v}</span>
        </div>
      </div>`;
    }
    return `<div class="form-group">
      <label class="form-label">${m.label} <span style="color:var(--text3);font-size:10px">(${m.unit})</span></label>
      <input type="number" class="form-input" id="metric-${m.id}" name="${m.id}" min="${m.min||0}" max="${m.max||9999}" step="${m.step||1}" value="${val}" placeholder="Enter value">
    </div>`;
  }).join('');
}

function submitDomainForm(domainId) {
  const dom = DOMAINS.find(d=>d.id===domainId);
  const metrics = {};
  dom.metrics.forEach(m=>{

  saveEntry(todayKey(), domainId, metrics);
  updateSidebar();
  showToast('Entry saved for '+dom.name+' domain ✓');
  // Re-render overview
  renderDomain(domainId);

let virgilHistory = [];  // [{role:'virgil'|'user', text:'...'}]

function virgilGetContext() {
  const today = todayKey();
  const overall = overallScore(today);
  const scores = DOMAINS.map(d => ({
    name: d.name, icon: d.icon, subtitle: d.subtitle,
    color: d.color, score: domainScore(d.id, today),
    status: statusLabel(domainScore(d.id, today)).label,
    trend: trend(d.id)
  }));
  const name = getData().settings?.name || 'Victor';
  const tasks = getTasks().filter(t => !t.completed);
  const overdueTasks = tasks.filter(t => t.dueDate && t.dueDate < today);

  return { today, overall, scores, name, tasks, overdueTasks };
}

function virgilSystemPrompt(ctx) {
  const taskList = ctx.tasks.slice(0, 20).map(t =>
    `  [${t.id}] [${t.domainId}] ${t.task}${t.dueDate ? ' (due '+t.dueDate+')' : ''} — ${t.progress||0}%${t.dueDate && t.dueDate < ctx.today ? ' OVERDUE' : ''}`
  ).join('\n') || '  (none)';

  const domainIds = DOMAINS.map(d => `${d.id} = ${d.name}`).join(', ');

  return `You are VIRGIL — a military-grade AI tactical advisor embedded in the Take Command 7 Battle Domains (TC 7BD) tracker, built on the book "TAKE COMMAND" by Victor Simukonda. Your role is to guide ${ctx.name} like a trusted senior commander reviewing their life campaign.

Your tone: Direct, military, strategic. Use military analogies. Reference specific domain data. Be personal — you know Victor's mission.

Today's Campaign Status (${ctx.today}):
Overall Combat Readiness: ${ctx.overall !== null ? ctx.overall + '%' : 'No data logged yet'}

Domain Scores:
${ctx.scores.map(s => `  ${s.icon} ${s.name} (${s.subtitle}): ${s.score !== null ? s.score + '%' : 'No data'} — ${s.status} ${s.trend === 'up' ? '▲' : s.trend === 'down' ? '▼' : '—'}`).join('\n')}

Active Tasks (${ctx.tasks.length} total, ${ctx.overdueTasks.length} overdue):
${taskList}

Domain IDs for task commands: ${domainIds}

== TASK MANAGEMENT COMMANDS — MANDATORY ==
CRITICAL RULE: When the user asks you to add, complete, or update a task, you MUST embed the command tag below. Simply describing or saying "I've added the task" WITHOUT the tag does NOTHING — the tag is what actually executes the action in the app. No tag = no task created.

To ADD a task:      <<ADD_TASK:domainId:Task description:YYYY-MM-DD>>
  (no due date:     <<ADD_TASK:domainId:Task description:>>)
To COMPLETE a task: <<COMPLETE_TASK:taskId>>
  (only use task IDs from the active task list above)
To UPDATE progress: <<UPDATE_PROGRESS:taskId:percentage>>

EXAMPLES:
User: "add a task to financial to set up savings by Friday"
You must include: <<ADD_TASK:financial:Set up savings account:2026-06-06>>

User: "add task under spiritual to read Book 1 by tomorrow"
You must include: <<ADD_TASK:spiritual:Read Book 1:2026-06-04>>

You may include multiple tags in one response.
After the tags, briefly confirm in plain language what was done.
NEVER skip the tag and just describe the action — that will not work.

Rules:
- Keep responses concise (under 200 words unless asked for a full briefing)
- Reference specific metrics when they exist
- Prioritize the most critical domains
- Always end with 1 concrete action order when giving advice
- If asked something outside TC 7BD, answer it but tie it back to the mission`;
}

function virgilRulesResponse(userMsg) {
  const ctx = virgilGetContext();
  const msg = userMsg.toLowerCase();
  const ai = runAI();

  // Check task commands first
  const taskResponse = virgilHandleTaskCommand(userMsg, ctx);
  if (taskResponse) return taskResponse;

  // Greeting / status request
  if (/^(hi|hello|hey|status|sitrep|report|brief|assess|analyze|analyse|start|begin|what|how am i|overview)/.test(msg) || msg.length < 20) {
    if (ctx.overall === null) {
      return `VIRGIL reporting, ${ctx.name}. No domain data logged yet — I can't give you a proper SITREP without numbers.\n\nOrder: Click **+ Log Today** and log at least 3 domains. Then come back and I'll give you a full Commander's Brief.`;
    }
    const weakest = [...ctx.scores].filter(s => s.score !== null).sort((a,b) => a.score - b.score)[0];
    const strongest = [...ctx.scores].filter(s => s.score !== null).sort((a,b) => b.score - a.score)[0];
    return `SITREP — ${ctx.today}\n\nOverall Combat Readiness: **${ctx.overall}%** — ${statusLabel(ctx.overall).label}\n\n${weakest ? `🔴 Priority Target: **${weakest.icon} ${weakest.name}** at ${weakest.score}% — this is your breach in the line.\n` : ''}${strongest ? `✅ Force Multiplier: **${strongest.icon} ${strongest.name}** at ${strongest.score}% — exploit this.\n` : ''}\n${ctx.overdueTasks.length > 0 ? `⚠️ ${ctx.overdueTasks.length} overdue task(s) need immediate action.\n` : ''}\nAsk me about any specific domain or say "battle plan" for your 3-point directive.`;
  }

  // Battle plan
  if (/battle.?plan|directive|orders|action.?plan|priorities|focus|what.?do|next.?step/.test(msg)) {
    if (ctx.overall === null) return `No data to plan from, ${ctx.name}. Log your domains first.`;
    const battlePlan = generateBattlePlan(ctx.scores);
    return `**COMMANDER'S BATTLE PLAN — ${ctx.today}**\n\n${battlePlan}`;
  }

  // Domain-specific queries
  for (const dom of DOMAINS) {
    if (msg.includes(dom.name.toLowerCase()) || msg.includes(dom.id)) {
      const s = ctx.scores.find(x => x.name === dom.name);
      const tier = s?.score === null || s?.score === undefined ? 'adequate' : s.score < 40 ? 'critical' : s.score < 60 ? 'degraded' : s.score < 75 ? 'adequate' : s.score < 90 ? 'good' : 'excellent';
      const insight = DOMAINS.find(d => d.id === dom.id).aiInsights[tier];
      return `**${dom.icon} ${dom.name} Domain** — ${s?.score !== null && s?.score !== undefined ? s.score + '%' : 'No data'}\n\nStatus: ${statusLabel(s?.score).label}\n\n${insight}\n\n**Order:** Pick one metric in ${dom.name} and improve it by end of day.`;
    }
  }

  // Task questions
  if (/task|overdue|todo|mission/.test(msg)) {
    const overdue = ctx.overdueTasks;
    if (!overdue.length) return `All tasks are in bounds, ${ctx.name} — no overdue items. ${ctx.tasks.length} active tasks in the queue. Maintain operational tempo.`;
    return `**${overdue.length} OVERDUE TASK(S):**\n\n${overdue.slice(0, 5).map(t => `• [${DOMAINS.find(d=>d.id===t.domainId)?.icon||''}] ${t.task} — due ${t.dueDate}`).join('\n')}\n\n**Order:** Handle the oldest overdue task within 24 hours. A commander who lets his tasks pile up loses command of his campaign.`;
  }

  // Spiritual
  if (/spiritual|prayer|faith|god|purpose|meaning|why/.test(msg)) {
    const s = ctx.scores.find(x => x.name === 'Spiritual');
    const ins = DOMAINS.find(d=>d.id==='spiritual').aiInsights[s?.score !== null && s?.score !== undefined ? (s.score<40?'critical':s.score<60?'degraded':s.score<75?'adequate':s.score<90?'good':'excellent') : 'adequate'];
    return `**⚔️ Spiritual Domain — Center of Gravity**\n\nScore: ${s?.score !== null && s?.score !== undefined ? s.score+'%' : 'Not logged'}\n\n${ins}`;
  }

  // Physical / health
  if (/physical|health|sleep|steps|exercise|body|fitness|hrv|heart/.test(msg)) {
    const s = ctx.scores.find(x => x.name === 'Physical');
    const ins = DOMAINS.find(d=>d.id==='physical').aiInsights[s?.score !== null && s?.score !== undefined ? (s.score<40?'critical':s.score<60?'degraded':s.score<75?'adequate':s.score<90?'good':'excellent') : 'adequate'];
    return `**🛡️ Physical Domain — First Line of Defense**\n\nScore: ${s?.score !== null && s?.score !== undefined ? s.score+'%' : 'Not logged'}\n\n${ins}`;
  }

  // Money / financial
  if (/financial|money|finance|debt|savings|invest|budget/.test(msg)) {
    const s = ctx.scores.find(x => x.name === 'Financial');
    const ins = DOMAINS.find(d=>d.id==='financial').aiInsights[s?.score !== null && s?.score !== undefined ? (s.score<40?'critical':s.score<60?'degraded':s.score<75?'adequate':s.score<90?'good':'excellent') : 'adequate'];
    return `**💰 Financial Domain — Life's Logistics**\n\nScore: ${s?.score !== null && s?.score !== undefined ? s.score+'%' : 'Not logged'}\n\n${ins}`;
  }

  // Fallback
  const lowestDomain = [...ctx.scores].filter(s => s.score !== null).sort((a,b) => a.score - b.score)[0];
  if (lowestDomain) {
    return `${ctx.name}, I'm VIRGIL — your TC 7BD tactical advisor. I'm best used when you ask me about specific domains, request a SITREP, or say "battle plan."\n\nRight now your **${lowestDomain.icon} ${lowestDomain.name}** domain at ${lowestDomain.score}% needs attention most. Want a full assessment on that?`;
  }
  return `${ctx.name}, I'm VIRGIL. Ask me for a SITREP, a battle plan, or about any specific domain like "How's my financial domain?" or "Give me a Spiritual assessment."`;
}

function virgilRenderMessages() {
  const el = document.getElementById('virgil-messages');
  if (!el) return;
  if (!virgilHistory.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text3);font-size:13px">VIRGIL is standing by. Ask for a SITREP or type your question.</div>';
    return;
  }
  el.innerHTML = virgilHistory.map(m => {
    if (m.role === 'typing') {
      return `<div class="vmsg virgil"><div class="vmsg-icon">⚔</div><div class="vmsg-typing"><span></span><span></span><span></span></div></div>`;
    }
    const isUser = m.role === 'user';
    const formatted = m.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    return `<div class="vmsg ${isUser ? 'user' : 'virgil'}">
      <div class="vmsg-icon">${isUser ? '🎖' : '⚔'}</div>
      <div class="vmsg-bubble">${formatted}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function virgilSend() {
  const input = document.getElementById('virgil-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '42px';

  virgilHistory.push({ role: 'user', text });
  virgilHistory.push({ role: 'typing' });
  virgilRenderMessages();

  const settings = getData().settings || {};
  const provider = settings.aiProvider || 'anthropic';
  const apiKey = provider === 'openai' ? settings.openaiKey : settings.apiKey;

  if (apiKey) {
    await virgilCallAI(text, provider, apiKey);
  } else {
    // Rules-based response with slight delay for feel
    await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
    const response = virgilRulesResponse(text);
    virgilHistory = virgilHistory.filter(m => m.role !== 'typing');
    virgilHistory.push({ role: 'virgil', text: response });
    virgilRenderMessages();
    virgilSpeak(response);
  }
}

async function virgilCallAI(userMsg, provider, apiKey) {
  const ctx = virgilGetContext();
  const systemPrompt = virgilSystemPrompt(ctx);

  // Build alternating message history (last 10 turns, excluding typing indicators)
  const recentHistory = virgilHistory
    .filter(m => m.role !== 'typing')
    .slice(-11, -1)
    .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));

  const messages = [];
  for (const msg of recentHistory) {
    if (messages.length && messages[messages.length-1].role === msg.role) continue;
    messages.push(msg);
  }
  messages.push({ role: 'user', content: userMsg });

  try {
    let replyText;

    if (provider === 'openai') {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'gpt-4o',
          max_tokens: 600,
          messages: [{ role: 'system', content: systemPrompt }, ...messages]
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || `HTTP ${response.status}`);
      replyText = data.choices?.[0]?.message?.content || 'VIRGIL could not generate a response.';

    } else {
      // Anthropic (default)
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 600,
          system: systemPrompt,
          messages
        })
      });
      const data = await response.json();
      if (!response.ok || data.type === 'error') throw new Error(data.error?.message || `HTTP ${response.status}`);
      replyText = data.content?.[0]?.text || 'VIRGIL could not generate a response.';
    }

    const processedText = virgilParseAndExecuteActions(replyText);
    virgilHistory = virgilHistory.filter(m => m.role !== 'typing');
    virgilHistory.push({ role: 'virgil', text: processedText });
    virgilSpeak(processedText);

  } catch (err) {
    virgilHistory = virgilHistory.filter(m => m.role !== 'typing');
    const isCors = err.message.includes('fetch') || err.message.includes('Network');
    virgilHistory.push({ role: 'virgil', text: isCors
      ? `Connection blocked — likely CORS from a local file. Switching to tactical mode.\n\n${virgilRulesResponse(userMsg)}`
      : `API error: ${err.message}\n\nFalling back:\n\n${virgilRulesResponse(userMsg)}`
    });
  }
  virgilRenderMessages();
}

function virgilQuickAsk(prompt) {

// ── VIRGIL VOICE ──
let virgilTTSOn = localStorage.getItem('virgil_tts') === '1';
let virgilRecognition = null;
let virgilListening = false;

function virgilToggleTTS() {
  virgilTTSOn = !virgilTTSOn;
  localStorage.setItem('virgil_tts', virgilTTSOn ? '1' : '0');
  const btn = document.getElementById('virgil-tts-btn');
  if (btn) { btn.classList.toggle('on', virgilTTSOn); btn.title = virgilTTSOn ? 'Voice: ON' : 'Voice: OFF'; }
  if (!virgilTTSOn) speechSynthesis.cancel();
  showToast(virgilTTSOn ? '🔊 Virgil voice ON' : '🔇 Virgil voice OFF');
}

function virgilSpeak(text) {
  if (!virgilTTSOn || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  // Strip markdown bold markers and action tags for clean speech
  const clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/<<[^>]+>>/g, '')
    .replace(/— Task Actions Executed —/g, '')
    .replace(/✅/g, '')
    .slice(0, 800); // cap length for TTS
  const utt = new SpeechSynthesisUtterance(clean);
  utt.rate = 1.0;
  utt.pitch = 0.9;
  // Pick a deeper/authoritative voice if available
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /david|mark|daniel|google uk|en-gb/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('male'))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  if (preferred) utt.voice = preferred;
  speechSynthesis.speak(utt);
}

function virgilToggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('⚠ Voice input needs Chrome or Edge'); return;
  }
  if (virgilListening) {
    virgilRecognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  virgilRecognition = new SR();
  virgilRecognition.lang = 'en-US';
  virgilRecognition.interimResults = false;
  virgilRecognition.maxAlternatives = 1;

  virgilListening = true;
  const mic = document.getElementById('virgil-mic-btn');
  if (mic) mic.classList.add('listening');

  virgilRecognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    const input = document.getElementById('virgil-input');
    if (input) { input.value = transcript; input.style.height = '42px'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; }
    virgilSend();
  };
  virgilRecognition.onerror = () => { showToast('⚠ Mic error — check browser permissions'); };
  virgilRecognition.onend = () => {
    virgilListening = false;
    const mic = document.getElementById('virgil-mic-btn');
    if (mic) mic.classList.remove('listening');
  };
  virgilRecognition.start();
}

// ── VIRGIL TASK ACTIONS ──
function virgilParseAndExecuteActions(text) {
  let cleaned = text;
  const executed = [];

  // ADD_TASK
  const addRe = /<<ADD_TASK:([^:]+):([^:>]+):([^>]*)>>/g;
  let m;
  while ((m = addRe.exec(text)) !== null) {
    const [full, domainId, taskName, dueDate] = m;
    const dom = DOMAINS.find(d => d.id === domainId.trim());
    if (dom && taskName.trim()) {
      addTask(domainId.trim(), taskName.trim(), '', dueDate.trim() || '', 0);
      executed.push(`✅ Task added to **${dom.name}**: "${taskName.trim()}"${dueDate.trim() ? ' (due ' + dueDate.trim() + ')' : ''}`);
    }
    cleaned = cleaned.replace(full, '');
  }

  // COMPLETE_TASK
  const completeRe = /<<COMPLETE_TASK:([^>]+)>>/g;
  while ((m = completeRe.exec(text)) !== null) {
    const [full, taskId] = m;
    const task = getTasks().find(t => t.id === taskId.trim());
    if (task) {
      completeTask(taskId.trim());
      executed.push(`✅ Task marked complete: "${task.task}"`);
    }
    cleaned = cleaned.replace(full, '');
  }

  // UPDATE_PROGRESS
  const progressRe = /<<UPDATE_PROGRESS:([^:]+):(\d+)>>/g;
  while ((m = progressRe.exec(text)) !== null) {
    const [full, taskId, pct] = m;
    const task = getTasks().find(t => t.id === taskId.trim());
    if (task) {
      updateTaskField(taskId.trim(), 'progress', Math.min(100, Math.max(0, parseInt(pct))));
      executed.push(`✅ Progress updated: "${task.task}" → ${pct}%`);
    }
    cleaned = cleaned.replace(full, '');
  }

  if (executed.length) {
    updateSidebar();
    // Append a task-action confirmation block to the cleaned text
    cleaned = cleaned.trim() + '\n\n**— Task Actions Executed —**\n' + executed.join('\n');
  }

  return cleaned.trim();
}

// Natural-language task commands for tactical (no-API) mode
function virgilHandleTaskCommand(msg, ctx) {
  const lower = msg.toLowerCase();

  // "complete / mark done / finish [task name]"
  const completeMatch = lower.match(/(?:complete|mark(?:\s+as)?\s+(?:done|complete|finished?)|finish|done with|checked off)\s+(?:task\s+)?[""']?(.+?)[""']?$/i);
  if (completeMatch) {
    const search = completeMatch[1].trim().toLowerCase();
    const task = getTasks().filter(t => !t.completed).find(t => t.task.toLowerCase().includes(search));
    if (task) {
      completeTask(task.id);
      updateSidebar();
      return `✅ Task marked complete: **"${task.task}"**\n\nGood execution, ${ctx.name}. Mission element closed. What's next?`;
    }
    return `I couldn't find an active task matching "${completeMatch[1]}". Say "show my tasks" to see the full list.`;
  }

  // Flexible add-task detection — handles many phrasings
  const addPatterns = [
    // "add task under [domain] to [description] due [date]"
    /(?:add|create|new)\s+(?:a\s+)?task\s+under\s+(\w+)\s+to\s+(.+?)(?:\s+(?:by|due)\s+(.+))?$/i,
    // "add task under [domain]: [description]"
    /(?:add|create|new)\s+(?:a\s+)?task\s+under\s+(\w+)[:\s]+(.+?)(?:\s+(?:by|due)\s+(.+))?$/i,
    // "add [description] task to [domain]" / "add task [desc] to [domain]"
    /(?:add|create|new)\s+(?:a\s+)?(?:task\s+)?[""']?(.+?)[""']?\s+(?:task\s+)?(?:to|in|for)\s+(?:the\s+)?(\w+)(?:\s+domain)?(?:\s+(?:by|due)\s+(.+))?$/i,
    // "create [domain] task: [description]"
    /(?:add|create|new)\s+(?:a\s+)?(\w+)\s+task[:\s]+[""']?(.+?)[""']?(?:\s+(?:by|due)\s+(.+))?$/i,
  ];

  for (const pattern of addPatterns) {
    const m = msg.match(pattern);
    if (!m) continue;

    // Patterns 1 & 2 & 4: group1=domain, group2=task, group3=date
    // Pattern 3: group1=task, group2=domain, group3=date
    let domainHint, taskName, dueDateStr;
    if (pattern === addPatterns[2]) {
      [, taskName, domainHint, dueDateStr] = m;
    } else {
      [, domainHint, taskName, dueDateStr] = m;
    }

    const dom = DOMAINS.find(d =>
      d.name.toLowerCase().includes(domainHint.trim().toLowerCase()) ||
      d.id.toLowerCase().includes(domainHint.trim().toLowerCase())
    );
    if (!dom) continue; // try next pattern

    const cleanTask = taskName.trim().replace(/^(to\s+)/i, ''); // strip leading "to "
    if (!cleanTask) continue;

    // Parse due date — handle "tomorrow", "Friday", or ISO dates
    let dueDate = '';
    if (dueDateStr) {
      const raw = dueDateStr.trim();
      const today = new Date();
      if (/tomorrow/i.test(raw)) {
        today.setDate(today.getDate() + 1);
        dueDate = today.toISOString().split('T')[0];
      } else if (/monday|tuesday|wednesday|thursday|friday|saturday|sunday/i.test(raw)) {
        const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        const target = days.findIndex(d => raw.toLowerCase().includes(d));
        const diff = (target - today.getDay() + 7) % 7 || 7;
        today.setDate(today.getDate() + diff);
        dueDate = today.toISOString().split('T')[0];
      } else {
        const parsed = new Date(raw);
        if (!isNaN(parsed)) dueDate = parsed.toISOString().split('T')[0];
      }
    }

    addTask(dom.id, cleanTask, '', dueDate, 0);
    updateSidebar();
    return `✅ Task added to **${dom.icon} ${dom.name}**: "${cleanTask}"${dueDate ? ' — due ' + dueDate : ''}\n\n**Order:** Log progress on this task daily.`;
  }

  // "update / set progress on [task] to [N]%"
  const progressMatch = msg.match(/(?:update|set)\s+(?:progress\s+(?:on|for)\s+)?[""']?(.+?)[""']?\s+(?:to|at)\s+(\d+)\s*%/i);
  if (progressMatch) {
    const search = progressMatch[1].trim().toLowerCase();
    const pct = Math.min(100, Math.max(0, parseInt(progressMatch[2])));
    const task = getTasks().filter(t => !t.completed).find(t => t.task.toLowerCase().includes(search));
    if (task) {
      updateTaskField(task.id, 'progress', pct);
      updateSidebar();
      return `✅ Progress updated: **"${task.task}"** → **${pct}%**\n\n${pct >= 75 ? 'Almost there — push through to the objective.' : 'Keep advancing. Steady progress wins campaigns.'}`;
    }
    return `Couldn't find a task matching "${progressMatch[1]}". Check the task list.`;
  }

  // "show / list my tasks"
  if (/show|list|what are|display/.test(lower) && /task/.test(lower)) {
    const tasks = getTasks().filter(t => !t.completed);
    if (!tasks.length) return `No active tasks in the system, ${ctx.name}. Say "add task [name] to [domain]" to create one.`;
    const byDomain = {};
    tasks.forEach(t => { if (!byDomain[t.domainId]) byDomain[t.domainId] = []; byDomain[t.domainId].push(t); });
    const lines = Object.entries(byDomain).map(([did, ts]) => {
      const dom = DOMAINS.find(d => d.id === did);
      return `**${dom?.icon||''} ${dom?.name||did}**\n${ts.map(t => `  • ${t.task}${t.dueDate ? ' (due '+t.dueDate+')' : ''} — ${t.progress||0}%`).join('\n')}`;
    });
    return `**Active Task Roster — ${tasks.length} tasks:**\n\n${lines.join('\n\n')}`;
  }

  return null; // not a task command
}

// ── VIRGIL LOGS ──
function virgilSaveChat() {
  const msgs = virgilHistory.filter(m => m.role !== 'typing');
  if (!msgs.length) { showToast('Nothing to save — chat is empty'); return; }
  const logs = JSON.parse(localStorage.getItem('virgil_logs') || '[]');
  const ctx = virgilGetContext();
  logs.unshift({
    id: Date.now(),
    date: ctx.today,
    timestamp: new Date().toLocaleString(),
    overallScore: ctx.overall,
    messageCount: msgs.length,
    messages: msgs
  });
  // Keep last 50 sessions
  if (logs.length > 50) logs.length = 50;
  localStorage.setItem('virgil_logs', JSON.stringify(logs));
  showToast('✓ Chat saved to Virgil Logs');
}

function virgilExportChat() {
  const msgs = virgilHistory.filter(m => m.role !== 'typing');
  if (!msgs.length) { showToast('Nothing to export'); return; }
  const ctx = virgilGetContext();
  const header = `VIRGIL — TC 7BD TACTICAL LOG\nDate: ${ctx.today}  |  Overall Readiness: ${ctx.overall !== null ? ctx.overall + '%' : 'No data'}\n${'─'.repeat(60)}\n\n`;
  const body = msgs.map(m => {
    const who = m.role === 'user' ? `[${ctx.name.toUpperCase()}]` : '[VIRGIL]';
    return `${who}\n${m.text.replace(/\*\*(.*?)\*\*/g, '$1')}\n`;
  }).join('\n');
  const blob = new Blob([header + body], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `virgil-log-${ctx.today}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function virgilLoadLog(idx) {
  const logs = JSON.parse(localStorage.getItem('virgil_logs') || '[]');
  if (!logs[idx]) return;
  virgilHistory = [...logs[idx].messages];
  document.getElementById('virgil-logs-modal').classList.add('hidden');
  virgilRenderMessages();
  showToast('Session loaded into chat');
}

function virgilExportLog(idx) {
  const logs = JSON.parse(localStorage.getItem('virgil_logs') || '[]');
  const log = logs[idx]; if (!log) return;
  const header = `VIRGIL — TC 7BD TACTICAL LOG\nDate: ${log.date}  |  Saved: ${log.timestamp}  |  Readiness: ${log.overallScore !== null ? log.overallScore + '%' : 'No data'}\n${'─'.repeat(60)}\n\n`;
  const body = log.messages.map(m => {
    const who = m.role === 'user' ? '[YOU]' : '[VIRGIL]';
    return `${who}\n${m.text.replace(/\*\*(.*?)\*\*/g, '$1')}\n`;
  }).join('\n');
  const blob = new Blob([header + body], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `virgil-log-${log.date}.txt`;
  a.click();
}

function virgilDeleteLog(idx) {
  if (!confirm('Delete this saved session?')) return;
  const logs = JSON.parse(localStorage.getItem('virgil_logs') || '[]');
  logs.splice(idx, 1);
  localStorage.setItem('virgil_logs', JSON.stringify(logs));
  virgilOpenLogs();
}

function openLogModal(domainId) {
  logModalDomainId = domainId || null;
  if(domainId) {
    const dom = DOMAINS.find(d=>d.id===domainId);
    const entry = getEntry(todayKey())[domainId]||{};
    document.getElementById('log-modal-title').textContent = dom.icon+' '+dom.name.toUpperCase()+' — LOG ENTRY';
    document.getElementById('log-modal-body').innerHTML = buildDomainForm(dom, entry);
  } else {
    // Show domain selector
    document.getElementById('log-modal-title').textContent = 'SELECT DOMAIN TO LOG';
    document.getElementById('log-modal-body').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${DOMAINS.map(d=>`<button class="tb-btn btn-ghost" style="justify-content:flex-start;padding:12px;display:flex;align-items:center;gap:8px" onclick="openLogModal('${d.id}')">${iconSvg(d.iconName,16,d.color)} ${d.name}</button>`).join('')}
      </div>`;
  }
  document.getElementById('log-modal').classList.remove('hidden');
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function submitLog() {
  if(!logModalDomainId) return;
  const dom = DOMAINS.find(d=>d.id===logModalDomainId);
  const metrics = {};
  dom.metrics.forEach(m=>{
    const el = document.getElementById('metric-'+m.id);
    if(el && el.value!=='') metrics[m.id] = parseFloat(el.value);
  });
  saveEntry(todayKey(), logModalDomainId, metrics);
  closeModal('log-modal');
  updateSidebar();
  showToast(dom.name+' entry saved ✓');
  if(currentView==='dashboard') renderDashboard();
  else if(currentView==='domain' && currentDomainId===logModalDomainId) renderDomain(logModalDomainId);
}
