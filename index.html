    <div style="display:grid;grid-template-columns:1fr 80px;gap:8px;align-items:center;margin-bottom:9px">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:3px">${f.label} <span style="color:var(--text3);font-weight:400">(${f.unit})</span></div>
        <input type="number" class="form-input" id="hf-${f.id}" step="any"
               value="${existing[f.id]??''}" placeholder="${f.placeholder}"
               style="padding:7px 10px;font-size:13px">
      </div>
    </div>`).join('');
}

function handleHealthFile(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    uploadedHealthImageData = e.target.result;
    // Show image + form immediately
    const drop = document.getElementById('health-drop');
    const panel = document.getElementById('health-entry-panel');
    const preview = document.getElementById('health-preview');
    const dropContent = document.getElementById('health-drop-content');
    if(drop) { drop.style.padding='0'; drop.style.border='none'; drop.style.background='none'; drop.style.cursor='default'; drop.onclick=null; }
    if(dropContent) dropContent.style.display='none';
    if(preview) preview.src = uploadedHealthImageData;
    if(panel) panel.style.display='block';
    // Build form with any existing values
    const formEl = document.getElementById('health-form-fields');
    if(formEl) formEl.innerHTML = buildHealthForm();
  };
  reader.readAsDataURL(file);
}

function handleHealthDrop(e) {
  e.preventDefault();
  document.getElementById('health-drop').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) handleHealthFile(file);
}

function saveHealthForm() {
  const metrics = {};
  HEALTH_FIELDS.forEach(f => {
    const el = document.getElementById('hf-' + f.id);
    if(el && el.value !== '') metrics[f.id] = parseFloat(el.value);
  });
  if(!Object.keys(metrics).length) { showToast('Enter at least one value first'); return; }
  saveEntry(todayKey(), 'physical', metrics);
  updateSidebar();
  showToast(`Health data saved ✓  (${Object.keys(metrics).length} metrics)`);
  renderDomain('physical');
  switchTabById('tab-overview');
}

async function parseHealthWithAI() {
  const apiKey = getData().settings?.apiKey;
  if(!apiKey) {
    alert('Please add your Anthropic API key in Settings first.');
    return;
  }
  if(!uploadedHealthImageData) return;

  document.getElementById('ai-loading-modal').classList.remove('hidden');

  try {
    const base64 = uploadedHealthImageData.split(',')[1];
    const mimeMatch = uploadedHealthImageData.match(/data:([^;]+)/);
    const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1024,
        messages:[{
          role:'user',
          content:[
            {type:'image', source:{type:'base64', media_type:mimeType, data:base64}},
            {type:'text', text:'Extract health metrics from this fitness tracker screenshot. Return ONLY a valid JSON object with these exact fields (use null if not visible): {"steps":null,"calories":null,"sleep_hrs":null,"sleep_score":null,"heart_rate":null,"blood_oxygen":null,"hrv":null,"skin_temp":null,"resp_rate":null,"stress_lvl":null} — stress_lvl should be 1-10 (Normal≈3, Low≈1, High≈7, Very High≈9). All numeric values.'}
          ]
        }]
      })
    });

    const data = await response.json();

    // Handle API-level errors
    if(!response.ok || data.type === 'error') {
      const msg = data.error?.message || `HTTP ${response.status}: ${JSON.stringify(data).slice(0,200)}`;
      throw new Error(msg);
    }
    if(!data.content || !data.content[0] || !data.content[0].text) {
      throw new Error('Unexpected response format from API: ' + JSON.stringify(data).slice(0,200));
    }

    // Extract JSON from the AI response (may be wrapped in markdown code fences)
    let jsonText = data.content[0].text.trim();
    const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('No JSON object found in AI response: ' + jsonText.slice(0,100));

    let parsed;
    try { parsed = JSON.parse(jsonMatch[0]); }
    catch(pe) { throw new Error('JSON parse failed: ' + jsonMatch[0].slice(0,100)); }

    // Map parsed fields to domain metric IDs
    const mapping = {steps:'steps', calories:'calories', sleep_hrs:'sleep_hrs', sleep_score:'sleep_score',
                     heart_rate:'heart_rate', blood_oxygen:'blood_oxygen', hrv:'hrv',
                     skin_temp:'skin_temp', resp_rate:'resp_rate', stress_lvl:'stress_lvl'};

    const metrics = {};
    Object.entries(mapping).forEach(([parsedKey, metricId])=>{
      const v = parsed[parsedKey];
      if(v !== null && v !== undefined && !isNaN(parseFloat(v))) metrics[metricId] = parseFloat(v);
    });

    if(!Object.keys(metrics).length) throw new Error('No health metrics could be extracted from this image. Try entering values manually.');

    saveEntry(todayKey(), 'physical', metrics);
    updateSidebar();
    showToast(`Health data imported ✓ (${Object.keys(metrics).length} metrics)`);
    renderDomain('physical');

  } catch(err) {
    console.error('Health import error:', err);
    const isCors = err.message.includes('Failed to fetch') || err.message.includes('NetworkError');
    alert(
      'AI parsing failed.\n\n' +
      (isCors ? 'CORS/Network error: Your browser may be blocking direct API calls from a local file.\nSolution: Serve this file via a local web server (e.g., VS Code Live Server or Python http.server).\n\n' : '') +
      'Error: ' + err.message +
      '\n\nYou can still use "Enter Manually" to input your health data.'
    );
  } finally {
    document.getElementById('ai-loading-modal').classList.add('hidden');
  }
}

// ================================================================
//  NAVIGATION & SIDEBAR
// ================================================================
function navigate(view, domainId) {
  currentView = view;
  currentDomainId = domainId||null;

  // Destroy all charts
  Object.keys(activeCharts).forEach(k=>destroyChart(k));

  // Update nav items
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
    if(el.dataset.view===view && (view!=='domain'||el.dataset.domain===domainId)) el.classList.add('active');
  });

  // Update topbar
  const titles = {dashboard:'Mission Dashboard', ai:'Virgil — XO', reports:'Battle Reports', settings:'Settings'};
  if(view==='domain') {
    const dom = DOMAINS.find(d=>d.id===domainId);
    document.getElementById('tb-title').textContent = dom.icon+' '+dom.name+' Domain';
  } else {
    document.getElementById('tb-title').textContent = titles[view]||view;
  }

  // Log btn visibility
  document.getElementById('tb-log-btn').style.display = view==='settings'?'none':'';

  // Render
  if(view==='dashboard') renderDashboard();
  else if(view==='domain') renderDomain(domainId);
  else if(view==='ai') renderAI();
  else if(view==='reports') renderReports();
  else if(view==='settings') renderSettings();
}

function updateSidebar() {
  const today = todayKey();
  const overall = overallScore(today);
  const st = statusLabel(overall);

  document.getElementById('sb-score').textContent = overall!==null?overall+'%':'--%';
  document.getElementById('sb-status').textContent = st.label;
  document.getElementById('sb-status').style.color = overall===null?'#4a5568':overall>=75?'#4ade80':overall>=60?'#fbbf24':'#f87171';
  document.getElementById('sb-bar').style.width = (overall||0)+'%';

  document.getElementById('domain-nav').innerHTML = DOMAINS.map(d=>{
    const score = domainScore(d.id, today);
    const t = trend(d.id);
    const tc = getTasks().filter(tk=>!tk.completed&&tk.domainId===d.id).length;
    return `<div class="nav-item" data-view="domain" data-domain="${d.id}" onclick="navigate('domain','${d.id}')">
      <span class="nav-icon">${iconSvg(d.iconName,18,d.color)}</span>
      <span class="nav-label">${d.name}${tc>0?`<span class="task-count-badge">${tc}</span>`:''}</span>
      <span class="nav-score" style="color:${d.color}">${score!==null?score+'%':'--'}</span>
      <span class="nav-trend">${trendHTML(t)}</span>
    </div>`;
  }).join('');

  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
    if(currentView==='domain' && el.dataset.domain===currentDomainId) el.classList.add('active');
    else if(currentView!=='domain' && el.dataset.view===currentView && !el.dataset.domain) el.classList.add('active');
  });
}

// ================================================================
//  TABS
// ================================================================
function switchTab(tabEl, targetId) {
  const container = tabEl.closest('.tabs').parentElement;
  container.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  container.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  tabEl.classList.add('active');
  const pane = document.getElementById(targetId);
  if(pane) pane.classList.add('active');
}
function switchTabById(id) {
  const pane = document.getElementById(id);
  if(!pane) return;
  const container = pane.parentElement;
  container.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  pane.classList.add('active');
  const idx = Array.from(container.querySelectorAll('.tab-pane')).indexOf(pane);
  const tabs = container.querySelectorAll('.tabs .tab');
  if(tabs[idx]) { tabs.forEach(t=>t.classList.remove('active')); tabs[idx].classList.add('active'); }
}

// ================================================================
function saveSettings() {
  const d = getData();
  d.settings = d.settings||{};
  d.settings.name = document.getElementById('s-name')?.value||'Victor';
  d.settings.apiKey = document.getElementById('s-apikey')?.value||'';
  d.settings.openaiKey = document.getElementById('s-openaikey')?.value||'';
  const provEl = document.querySelector('input[name="aiProvider"]:checked');
  d.settings.aiProvider = provEl ? provEl.value : 'anthropic';
  saveData(d);
  showToast('Settings saved ✓');
}

function exportData() {
  // Bundle ALL app data — domain logs, tasks, finance, virgil logs, settings
  const bundle = {
    _version: 2,
    _exportedAt: new Date().toISOString(),
    tcmd_data:    getData(),
    tc_tasks:     JSON.parse(localStorage.getItem('tc_tasks')    || '[]'),
    tc_finance:   JSON.parse(localStorage.getItem('tc_finance')  || '{}'),
    tc_budget:    JSON.parse(localStorage.getItem(BUDGET_KEY)    || '{}'),
    virgil_logs:  JSON.parse(localStorage.getItem('virgil_logs') || '[]'),
  };
  const counts = [
    `${Object.keys(bundle.tcmd_data.entries||{}).length} days logged`,
    `${bundle.tc_tasks.length} tasks`,
    `${Object.keys(bundle.tc_finance).length} finance months`,
    `${bundle.virgil_logs.length} Virgil sessions`,
  ].join(' · ');
  const blob = new Blob([JSON.stringify(bundle, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tc-7bd-full-backup-' + todayKey() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Full backup exported — ' + counts);
}

function importData() { document.getElementById('import-file').click(); }

function handleImportFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);

      // New full-bundle format (v2)
      if(d._version === 2 && d.tcmd_data) {
        saveData(d.tcmd_data);
        if(Array.isArray(d.tc_tasks))   localStorage.setItem('tc_tasks',    JSON.stringify(d.tc_tasks));
        if(d.tc_finance)                localStorage.setItem('tc_finance',  JSON.stringify(d.tc_finance));
        if(d.tc_budget)                 localStorage.setItem(BUDGET_KEY,    JSON.stringify(d.tc_budget));
        if(Array.isArray(d.virgil_logs))localStorage.setItem('virgil_logs', JSON.stringify(d.virgil_logs));
        const taskCount = (d.tc_tasks||[]).length;
        const dayCount  = Object.keys(d.tcmd_data.entries||{}).length;
        showToast(`✓ Imported — ${dayCount} days, ${taskCount} tasks restored`);
        navigate(currentView, currentDomainId);
        return;
      }

      // Legacy format (v1 — entries only)
      if(d.entries) { saveData(d); showToast('Data imported ✓ (legacy format — tasks not included)'); navigate(currentView, currentDomainId); }
      else alert('Invalid data file format.');
    } catch(err) { alert('Failed to parse file: '+err.message); }
  };
  reader.readAsText(file);
}

function clearData() {
  if(confirm('Delete ALL tracking data? This cannot be undone.')) {
    const d = getData();
    d.entries = {};
    saveData(d);
    showToast('All data cleared');
    navigate('dashboard');
  }
}

// ================================================================
//  API KEY TEST
// ================================================================
async function testApiKey() {
  const resultEl = document.getElementById('api-test-result');
  const provEl = document.querySelector('input[name="aiProvider"]:checked');
  const provider = provEl ? provEl.value : (getData().settings?.aiProvider || 'anthropic');
  const apiKey = provider === 'openai'
    ? (document.getElementById('s-openaikey')?.value || getData().settings?.openaiKey)
    : (document.getElementById('s-apikey')?.value || getData().settings?.apiKey);

  if(!apiKey) { if(resultEl) resultEl.innerHTML=`<span style="color:#f87171">⚠ No ${provider==='openai'?'OpenAI':'Anthropic'} key entered.</span>`; return; }
  if(resultEl) resultEl.innerHTML=`<span style="color:var(--text2)">Testing ${provider==='openai'?'OpenAI':'Anthropic'} connection…</span>`;

  try {
    let ok = false;
    if(provider === 'openai') {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json'},
        body:JSON.stringify({model:'gpt-4o',max_tokens:5,messages:[{role:'user',content:'Say OK'}]})
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
      ok = !!data.choices?.[0]?.message?.content;
    } else {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'Reply with OK'}]})
      });
      const data = await res.json();
      if(!res.ok || data.type==='error') throw new Error(data.error?.message || `HTTP ${res.status}`);
      ok = !!data.content?.[0]?.text;
    }
    if(resultEl) resultEl.innerHTML=ok
      ? `<span style="color:#4ade80">✓ ${provider==='openai'?'GPT-4o':'Claude'} key is valid and connected!</span>`
      : `<span style="color:#fbbf24">⚠ Connected but unexpected response.</span>`;
  } catch(err) {
    const isCors = err.message.includes('fetch') || err.message.includes('Network');
    if(resultEl) resultEl.innerHTML=`<span style="color:#f87171">✗ ${isCors?'CORS/Network error — try a local server':'Connection failed: '+err.message}</span>`;
  }
}

// ================================================================
//  TOAST
// ================================================================
function showToast(msg) {
  let t = document.getElementById('toast');
  if(!t) {
    t = document.createElement('div');
    t.id = 'toast';
    Object.assign(t.style, {
      position:'fixed', bottom:'24px', right:'24px',
      background:'#276749', color:'#fff',
      padding:'10px 18px', borderRadius:'8px',
      fontSize:'13px', fontWeight:'700', zIndex:'999',
      boxShadow:'0 4px 12px rgba(0,0,0,.4)', transition:'opacity .3s'
    });
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity='0'; }, 2800);
}
